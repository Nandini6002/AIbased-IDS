<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{

    background:#020617;

    color:white;

    font-family:Arial;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;
}

.box{

    background:#111827;

    padding:40px;

    border-radius:20px;

    width:350px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,255,153,0.2);
}

input{

    width:100%;

    padding:15px;

    margin:15px 0;

    border:none;

    border-radius:10px;

    background:#1e293b;

    color:white;
}

button{

    width:100%;

    padding:15px;

    background:#00ff99;

    border:none;

    border-radius:10px;

    font-weight:bold;

    cursor:pointer;
}

button:hover{

    background:#00cc7a;
}

a{

    color:#00ff99;
}

.error{

    background:#ff4d4d;

    padding:12px;

    border-radius:10px;

    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="box">

<h1>AI IDS Login</h1>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

<br>

<a href="/signup">

Create Account

</a>

</div>

</body>

</html>
