<!-- FILE: templates/logs.html -->

<!DOCTYPE html>
<html>

<head>

<title>Logs</title>

<style>

body{

    background:#020617;

    color:white;

    font-family:Arial;

    padding:30px;
}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:15px;

    border:1px solid #1e293b;

    text-align:center;
}

th{

    background:#00ff99;

    color:black;
}

tr{

    background:#111827;
}

h1{

    color:#00ff99;
}

</style>

</head>

<body>

<h1>Live Security Logs</h1>

<table>

<thead>

<tr>

<th>Source IP</th>
<th>Destination IP</th>
<th>Protocol</th>
<th>Packet Size</th>
<th>Status</th>
<th>Severity</th>
<th>Time</th>

</tr>

</thead>

<tbody id="logsTable">

</tbody>

</table>

<script>

async function loadLogs(){

    const response = await fetch('/get_logs');

    const data = await response.json();

    const table =
    document.getElementById("logsTable");

    table.innerHTML = "";

    data.forEach(log => {

        table.innerHTML += `

        <tr>

        <td>${log.source_ip}</td>
        <td>${log.destination_ip}</td>
        <td>${log.protocol}</td>
        <td>${log.packet_size}</td>
        <td>${log.status}</td>
        <td>${log.severity}</td>
        <td>${log.timestamp}</td>

        </tr>

        `;

    });

}

setInterval(loadLogs,2000);

loadLogs();

</script>

</body>

</html>
